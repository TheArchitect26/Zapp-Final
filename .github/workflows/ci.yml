name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Zapp-money-round4-fixed

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Zapp-money-round4-fixed/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build
