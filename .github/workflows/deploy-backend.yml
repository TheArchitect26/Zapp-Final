name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "Zapp-money-round4-fixed/src/**"
      - "Zapp-money-round4-fixed/Dockerfile"
      - "Zapp-money-round4-fixed/package*.json"

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: Zapp-money-round4-fixed
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/zapp-v3/backend:latest,ghcr.io/${{ github.repository_owner }}/zapp-v3/backend:${{ github.sha }}
